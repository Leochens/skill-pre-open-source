  <circle cx="126" cy="112" r="12" fill="#071a1f"/>
  <circle cx="166" cy="112" r="12" fill="#071a1f"/>
  <circle cx="206" cy="112" r="12" fill="#071a1f"/>
  <text x="250" y="123" fill="#071a1f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26" font-weight="700">SKILL / PUBLIC RELEASE AUDIT</text>
  <text x="126" y="236" fill="#d7ffe8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="58" font-weight="800">Pre-Open</text>
  <text x="126" y="304" fill="#d7ffe8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="58" font-weight="800">Source</text>
  <text x="130" y="372" fill="#fff5bd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="25">secrets + license + docs + repo hygiene</text>
