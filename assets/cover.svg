<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Pre-Open Source skill intro image</title>
  <desc id="desc">A security audit interface card for the Pre-Open Source Codex skill.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06161a"/>
      <stop offset=".52" stop-color="#0c5136"/>
      <stop offset="1" stop-color="#72e58d"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#d7ffe8" stroke-opacity=".14" stroke-width="2"/>
