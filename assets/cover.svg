    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="12" dy="12" stdDeviation="0" flood-color="#02090b" flood-opacity=".62"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
